<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orbital — Blog</title>
  <meta name="description" content="Orbital blog — capacity intelligence, clinical-grade tracking, and care team workflows.">
  <meta name="theme-color" content="#05060A">
  <link rel="icon" href="/favicon.ico">
  <link rel="canonical" href="https://orbitalhealth.app/blog">

  <!-- Fonts: DM Sans (headings/buttons), Space Mono (data/labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #05060A;
      --cyan: #00D7FF;
      --cyan-dim: rgba(0, 215, 255, 0.12);
      --cyan-border: rgba(0, 215, 255, 0.25);
      --text: rgba(255,255,255,0.92);
      --text-dim: rgba(255,255,255,0.6);
      --surface: rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #101322 0, #05060A 55%, #01020A 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #00E5FF 0, #0084FF 40%, #05060A 75%);
      box-shadow: 0 0 26px rgba(0, 213, 255, 0.45);
    }

    .nav-title {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--text-dim);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
    }

    .nav-link {
      color: var(--text-dim);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .nav-link:hover {
      color: #ffffff;
      border-color: var(--border);
      background: rgba(255,255,255,0.02);
    }
    .nav-link-active {
      color: #ffffff;
      border-color: var(--cyan-border);
      background: var(--cyan-dim);
    }

    .hero {
      padding: 8px 0 24px;
    }

    .hero-kicker {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 600;
      font-size: clamp(28px, 4vw, 34px);
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .hero-title span {
      color: var(--cyan);
    }

    .hero-body {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 580px;
    }

    .blog-grid {
      margin-top: 32px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 20px;
    }

    @media (min-width: 768px) {
      .blog-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .card {
      position: relative;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(13, 21, 40, 0.96));
      box-shadow:
        0 18px 40px rgba(0,0,0,0.7),
        0 0 0 1px rgba(0, 215, 255, 0.02);
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, background 0.18s ease;
      cursor: default;
    }

    .card:hover {
      border-color: var(--border-hover);
      background: linear-gradient(135deg, rgba(10,12,26,0.96), rgba(5,6,14,0.98));
      transform: translateY(-2px);
      box-shadow:
        0 22px 55px rgba(0,0,0,0.9),
        0 0 0 1px rgba(0, 215, 255, 0.06);
    }

    .card-tag-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .card-theme {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 10px;
    }

    .card-date {
      font-family: 'Space Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }

    .card-hook {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.25;
    }

    .card-caption {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .card-footer {
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .card-hashtags {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pill {
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid var(--cyan-border);
      background: var(--cyan-dim);
      color: var(--cyan);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .empty {
      margin-top: 40px;
      padding: 26px 20px;
      border-radius: 18px;
      border: 1px dashed var(--border);
      background: radial-gradient(circle at top left, rgba(0,215,255,0.12), transparent 55%);
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    .empty span {
      color: var(--cyan);
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="nav">
      <div class="nav-left">
        <div class="nav-logo" aria-hidden="true"></div>
        <div>
          <div class="nav-title">Orbital Health</div>
        </div>
      </div>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="/" class="nav-link">Product</a>
        <a href="/therapists" class="nav-link">Therapists</a>
        <a href="/groups" class="nav-link">Groups</a>
        <a href="/coach" class="nav-link">Coaches</a>
        <a href="/blog" class="nav-link nav-link-active">Blog</a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-kicker">Blog</div>
      <h1 class="hero-title">
        Notes from the <span>orbital</span> field.
      </h1>
      <p class="hero-body">
        Essays, experiments, and clinical notes from building capacity intelligence for high-performance professionals and their care teams.
      </p>
    </section>

    <section id="blog-root" class="blog-grid" aria-live="polite"></section>

    <div id="blog-empty" class="empty" style="display:none">
      No posts yet. <span>Check back soon —</span> we ship new experiments frequently.
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.46.1/+esm'

    // Public client: URL + anon key (read-only)
    const supabaseUrl = 'https://tenfwzjccqfecctxdbpi.supabase.co'
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbmZ3empjY3FmZWNjdHhkYnBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjMyOTEsImV4cCI6MjA4NDczOTI5MX0.xeRT_gTzqx9EBcqzThJyydMWk28HnE3IV0nThzRNvi8'

    const supabase = createClient(supabaseUrl, supabaseAnonKey)

    function fmtDate(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      return d.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
      })
    }

    function renderPosts(posts) {
      const root = document.getElementById('blog-root')
      const empty = document.getElementById('blog-empty')

      if (!posts.length) {
        empty.style.display = 'block'
        root.innerHTML = ''
        return
      }

      empty.style.display = 'none'

      root.innerHTML = posts
        .map((post) => {
          const hook = post.hook || '(Untitled)'
          const caption = post.caption || ''
          const theme = post.theme || 'General'
          const created = fmtDate(post.created_at)
          const hashtags = Array.isArray(post.hashtags) ? post.hashtags : []
          const hashtagLine = hashtags
            .filter(Boolean)
            .map((t) => (String(t).startsWith('#') ? t : '#' + String(t)))
            .join(' ')

          return `
            <article class="card">
              <div class="card-tag-row">
                <div class="card-theme">${theme}</div>
                <time class="card-date" datetime="${post.created_at || ''}">${created}</time>
              </div>
              <h2 class="card-hook">${hook}</h2>
              ${
                caption
                  ? `<p class="card-caption">${caption.replace(/</g, '&lt;')}</p>`
                  : ''
              }
              <div class="card-footer">
                <span class="pill">Approved</span>
                <span class="card-hashtags">${hashtagLine}</span>
              </div>
            </article>
          `
        })
        .join('')
    }

    async function loadBlogPosts() {
      try {
        const { data, error } = await supabase
          .from('content_queue')
          .select('id, hook, caption, theme, format, status, hashtags, created_at')
          .eq('format', 'blog')
          .eq('status', 'approved')
          .order('created_at', { ascending: false })
          .limit(24)

        if (error) {
          // Fail gracefully; keep page usable.
          console.error('Failed to load blog posts from Supabase:', error)
          document.getElementById('blog-empty').style.display = 'block'
          return
        }

        renderPosts(data || [])
      } catch (err) {
        console.error('Unexpected error loading blog posts:', err)
        document.getElementById('blog-empty').style.display = 'block'
      }
    }

    loadBlogPosts()
  </script>
</body>
</html>
