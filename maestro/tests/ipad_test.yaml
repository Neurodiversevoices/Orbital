appId: com.erparris.orbital
---
- launchApp:
    appId: com.erparris.orbital
    clearState: false
- runFlow:
    when:
      visible: "Terms of Service"
    commands:
      - scrollDown:
          speed: 40
          duration: 3000
      - tapOn: "Scroll to Accept"
      - waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*"
- takeScreenshot: "ipad_01_home"
- tapOn:
    text: "Plans"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "ipad_02_paywall"
