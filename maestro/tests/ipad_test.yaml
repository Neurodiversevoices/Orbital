# -e REVIEW_EMAIL / -e REVIEW_PASSWORD when auth screen appears
appId: com.erparris.orbital
---
- launchApp:
    appId: com.erparris.orbital
    clearState: false
- runFlow:
    when:
      visible: "Terms of Service"
    commands:
      - scroll
      - scroll
      - scroll
      - scroll
      - scroll
      - scroll
      - tapOn:
          text: "I Accept"
          optional: true
      - tapOn:
          text: "Scroll to Accept"
          optional: true
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Age Verification"
    commands:
      - tapOn: "YYYY"
      - inputText: "1990"
      - tapOn: "I confirm that I am at least 13 years old."
      - tapOn: "Continue"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Sign in with email"
    commands:
      - tapOn: "Sign in with email"
      - tapOn: "Email"
      - inputText: ${REVIEW_EMAIL}
      - tapOn: "Password"
      - inputText: ${REVIEW_PASSWORD}
      - tapOn: "Sign in"
      - waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*"
- takeScreenshot: "ipad_01_home"
- tapOn:
    point: "8%, 9%"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "ipad_02_paywall"
