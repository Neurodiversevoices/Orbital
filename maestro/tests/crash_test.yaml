appId: com.erparris.orbital
---
- launchApp:
    appId: com.erparris.orbital
    clearState: false
- runFlow:
    when:
      visible: "Terms of Service"
    commands:
      - scrollDown:
          speed: 40
          duration: 3000
      - tapOn: "Scroll to Accept"
      - waitForAnimationToEnd
- waitForAnimationToEnd

# Rapid navigation stress test
- tapOn:
    text: "Plans"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "×"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Settings"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Plans"
    optional: true
- waitForAnimationToEnd

# Background/foreground
- pressKey: Home
- waitForAnimationToEnd
- launchApp:
    appId: com.erparris.orbital
    clearState: false
- runFlow:
    when:
      visible: "Terms of Service"
    commands:
      - scrollDown:
          speed: 40
          duration: 3000
      - tapOn: "Scroll to Accept"
      - waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*"
