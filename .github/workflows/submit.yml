# Orbital — push to `submission` → validate → ASC/RevenueCat sync → EAS production + auto-submit
name: Submit (iOS production)

on:
  push:
    branches: [submission]
  workflow_dispatch:

concurrency:
  group: orbital-submit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pre-submit validation (Stages 1–4)
        run: node scripts/validate.js

      - name: Write App Store Connect API key (p8)
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p keys
          printf '%s\n' "$ASC_API_KEY_P8" > keys/AuthKey_HD4HWHHYDK.p8

      - name: Sync IAPs to App Store Connect
        run: node scripts/setup-iap.js

      - name: Sync RevenueCat products
        env:
          REVENUECAT_SECRET_API_KEY: ${{ secrets.REVENUECAT_SECRET_API_KEY }}
        run: node scripts/setup-revenuecat.js

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS build + auto-submit iOS (production)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform ios --profile production --non-interactive --auto-submit
